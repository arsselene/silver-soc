[honeypot]
# Hostname the honeypot pretends to be
hostname = webserver-prod-01

# Directory where Cowrie stores its data
log_path = var/log/cowrie
download_path = var/lib/cowrie/downloads
share_path = share/cowrie
state_path = var/lib/cowrie
etc_path = etc
contents_path = honeyfs
txtcmds_path = txtcmds
tty_log_path = var/lib/cowrie/tty
auth_class = UserDB

# Fake OS version shown to attackers
kernel_version = 5.15.0-91-generic
kernel_build_string = #101-Ubuntu SMP Tue Nov 14 13:30:08 UTC 2023
hardware_platform = x86_64
operating_system = GNU/Linux

# Fake system timezone
timezone = UTC

# Maximum login attempts before disconnect
login_attempts = 5

# Fake successful login after N failed attempts (makes it look real)
# -1 = never succeed (pure tarpit)
auth_none_enabled = false

# Fake filesystem — attackers see a real-looking Linux system
fake_addr = 192.168.100.166

[ssh]
enabled = true
# Listen on 2222, but in your docker-compose we expose it as port 22 externally
listen_endpoints = tcp:2222:interface=0.0.0.0
version = SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6

# RSA host key (Cowrie generates one on first boot)
rsa_public_key = var/lib/cowrie/ssh_host_rsa_key.pub
rsa_private_key = var/lib/cowrie/ssh_host_rsa_key
dsa_public_key = var/lib/cowrie/ssh_host_dsa_key.pub
dsa_private_key = var/lib/cowrie/ssh_host_dsa_key
ecdsa_public_key = var/lib/cowrie/ssh_host_ecdsa_key.pub
ecdsa_private_key = var/lib/cowrie/ssh_host_ecdsa_key

# Fake shell delay (makes it look like a real login)
forwarding = false
auth_keyboard_interactive_enabled = false

[telnet]
enabled = true
listen_endpoints = tcp:2223:interface=0.0.0.0

[output_jsonlog]
enabled = true
logfile = ${honeypot:log_path}/cowrie.json
epoch_timestamp = false

[output_textlog]
enabled = true
logfile = ${honeypot:log_path}/cowrie.log

[output_mysql]
enabled = false

[output_elasticsearch]
enabled = false

[backend_pool]
pool_only = false
