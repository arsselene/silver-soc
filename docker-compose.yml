# ============================================================
# MOBILIS SOC V2 — DOCKER COMPOSE
# C:\Users\mazar\OneDrive\Desktop\mobilis-soc\docker-compose.yml
# ============================================================

services:

  # ── SURICATA — Layer 1 signature IDS ─────────────────────
  # Add this block to your docker-compose.yml under 'services:'
  honeypot:
    image: cowrie/cowrie:latest
    container_name: mobilis_honeypot
    restart: unless-stopped
    ports:
      - "22:2222"
      - "23:2223"
    volumes:
      - ./honeypot/cowrie.cfg:/cowrie/etc/cowrie.cfg:ro
      - honeypot_data:/cowrie/cowrie-git/var/lib/cowrie
      - honeypot_logs:/cowrie/cowrie-git/var/log/cowrie
      - honeypot_tty:/cowrie/cowrie-git/var/lib/cowrie/tty         # <-- ADD THIS
      - honeypot_dl:/cowrie/cowrie-git/var/lib/cowrie/downloads
    networks:
      - mobilis_net

  honeypot_producer:
    build: ./honeypot
    container_name: mobilis_honeypot_producer
    restart: unless-stopped
    depends_on:
      - honeypot
      - kafka
    environment:
      - KAFKA_BROKER=kafka:9092
      - COWRIE_LOG=/cowrie/cowrie-git/var/log/cowrie/cowrie.json
    volumes:
      - honeypot_logs:/cowrie/cowrie-git/var/log/cowrie
    networks:
      - mobilis_net
  suricata:
    image: jasonish/suricata:latest
    container_name: mobilis_suricata
    restart: unless-stopped
    network_mode: host          # MUST be host — needs to see real WiFi traffic
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./suricata/suricata.yaml:/etc/suricata/suricata.yaml
      - ./suricata/logs:/var/log/suricata
      - suricata_rules:/var/lib/suricata/rules
    command: >
      -c /etc/suricata/suricata.yaml
      --af-packet
      -i WiFi
      --init-errors-fatal
    environment:
      - SURICATA_OPTIONS=-l /var/log/suricata
      #~~~~~~AI~~~~
  ai_engine:
    build: ./ai_engine
    container_name: mobilis_ai_engine
    restart: unless-stopped
    command: ["python", "-u", "main.py"]   
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      AI_THRESHOLD_NORMAL: "-0.0161"
      AI_THRESHOLD_ZERO_DAY: "-0.0500"   
    volumes:
      - ./ai_engine/models:/app/models
    ports:
      - "8001:8000"
    networks:
      - mobilis_net
  suricata_update:
    image: jasonish/suricata:latest
    container_name: mobilis_suricata_update
    volumes:
      - suricata_rules:/var/lib/suricata/rules
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "suricata-update --no-reload --suricata-conf /etc/suricata/suricata.yaml &&
       echo 'Rules updated successfully'"
    restart: "no"
 
  suricata_producer:
    build: ./suricata
    container_name: mobilis_suricata_producer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      EVE_LOG: /var/log/suricata/eve.json
    volumes:
      - ./suricata/logs:/var/log/suricata
    networks:
      - mobilis_net
 
# Also add this under 'volumes:' at the bottom:
# suricata_rules:
 

  # ── ZOOKEEPER (Kafka coordinator) ─────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: mobilis_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_PORT}
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - mobilis_net
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost ${ZOOKEEPER_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── KAFKA (message broker) ────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: mobilis_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_PORT}:${KAFKA_PORT}"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:${ZOOKEEPER_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:${KAFKA_INTERNAL_PORT},PLAINTEXT_HOST://localhost:${KAFKA_PORT}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - mobilis_net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:${KAFKA_INTERNAL_PORT}", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── KAFKA TOPIC SETUP (runs once then exits) ──────────────
  kafka_setup:
    image: confluentinc/cp-kafka:7.5.0
    container_name: mobilis_kafka_setup
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - mobilis_net
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:${KAFKA_INTERNAL_PORT} --create --if-not-exists --topic network-traffic --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:${KAFKA_INTERNAL_PORT} --create --if-not-exists --topic suricata-alerts --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:${KAFKA_INTERNAL_PORT} --create --if-not-exists --topic honeypot-alerts --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:${KAFKA_INTERNAL_PORT} --create --if-not-exists --topic ai-predictions --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:${KAFKA_INTERNAL_PORT} --create --if-not-exists --topic threat-intel --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:${KAFKA_INTERNAL_PORT} --create --if-not-exists --topic soar-actions --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:${KAFKA_INTERNAL_PORT} --create --if-not-exists --topic ueba-alerts --partitions 1 --replication-factor 1
      echo 'All topics created.'
      "
    restart: "no"

  # ── POSTGRESQL (primary database) ────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mobilis_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mobilis_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── REDIS (UEBA profiles + threat intel cache) ────────────
  redis:
    image: redis:7-alpine
    container_name: mobilis_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - mobilis_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ELASTICSEARCH (full-text flow search) ─────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: mobilis_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "${ELASTIC_PORT}:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    networks:
      - mobilis_net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ── HONEYPOT — Layer 0.5 deception (Cowrie) ───────────────


  # ── AI ENGINE — Layer 2 Isolation Forest + SHAP ───────────

  # ── UEBA PROFILER — Layer 3 behavioral ────────────────────
  ueba:
    build: ./ueba
    container_name: mobilis_ueba
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      WINDOWS_HOST_IP: ${WINDOWS_HOST_IP}
    networks:
      - mobilis_net

  # ── INTEL ENRICHER — Layer 4 threat intelligence ──────────
  intel:
    build: ./intel
    container_name: mobilis_intel
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY}
      OTX_API_KEY: ${OTX_API_KEY}
      ABUSEIPDB_BLOCK_THRESHOLD: ${ABUSEIPDB_BLOCK_THRESHOLD}
    networks:
      - mobilis_net

  # ── SOAR ENGINE — decision + automated response ───────────
  soar:
    build: ./soar
    container_name: mobilis_soar
    restart: unless-stopped
    command: ["python", "-u", "engine.py"]
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      SOFT_BLOCK_MINUTES: ${SOFT_BLOCK_MINUTES}
      ABUSEIPDB_BLOCK_THRESHOLD: ${ABUSEIPDB_BLOCK_THRESHOLD}
      AI_THRESHOLD_ZERO_DAY: ${AI_THRESHOLD_ZERO_DAY}
    networks:
      - mobilis_net

  # ── DASHBOARD BACKEND (FastAPI) ───────────────────────────
  dashboard_backend:
    build: ./dashboard/backend
    container_name: mobilis_dashboard_backend
    restart: unless-stopped
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - mobilis_net

  dashboard_frontend:
    build: ./dashboard/frontend
    container_name: mobilis_dashboard_frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    networks:
      - mobilis_net

  # ── AUTO-RETRAINER (nightly 2am job) ─────────────────────
  retrainer:
    build: ./retrainer
    container_name: mobilis_retrainer
    restart: unless-stopped
    command: ["python", "-u", "retrain.py"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AI_THRESHOLD_NORMAL: ${AI_THRESHOLD_NORMAL}
      MODEL_PATH: /app/models
      MIN_SAMPLES: "1000"
      RETRAIN_HOUR: "2"
    volumes:
      - ./ai_engine/models:/app/models
    networks:
      - mobilis_net

# ── VOLUMES ───────────────────────────────────────────────────
volumes:
  zookeeper_data:
  kafka_data:
  postgres_data:
  redis_data:
  elastic_data:
  suricata_rules:
  honeypot_data:
  honeypot_logs:
  honeypot_tty:      
  honeypot_dl:

# ── NETWORK ───────────────────────────────────────────────────
networks:
  mobilis_net:
    driver: bridge
